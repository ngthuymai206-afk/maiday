<html lang="zh-Hant">

    <style>
        :root {
            --bg: #F3F6F8;
            --white: #FFFFFF;
            --blue: #0A66C2;
            --text: #000000;
            --gray: rgba(0, 0, 0, 0.6);
            --shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding: 20px;
        }

        .container {
            max-width: 1128px;
            margin: 0 auto;
        }

        /* 個人主卡片 */
        .profile-card {
            background: var(--white);
            border-radius: 10px;
            box-shadow: var(--shadow);
            overflow: hidden;
            position: relative;
            margin-bottom: 20px;
        }

        .banner {
            height: 200px;
            background: linear-gradient(135deg, #A0B4CB, #708090);
        }

        .info-section {
            padding: 24px;
            position: relative;
            /* 關鍵修正：增加頂部內邊距，確保名字在照片下方 */
            padding-top: 80px; 
        }

        .photo-box {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 4px solid var(--white);
            position: absolute;
            top: -100px; /* 向上移動壓在 banner 上 */
            left: 24px;
            background: #eee;
            overflow: hidden;
            z-index: 10;
        }

        .photo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
