<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[maiday] - 專業個人簡介 | LinkedIn 風格</title>
    <style>
        /* --- 基礎樣式 (LinkedIn 配色) --- */
        :root {
            --bg-color: #F3F6F8;
            --white: #FFFFFF;
            --text-main: #000000;
            --text-secondary: rgba(0, 0, 0, 0.6);
            --link-color: #0A66C2;
            --border-color: #E0E0E0;
            --shadow: 0 0 0 1px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
            padding-bottom: 50px;
        }

        .container {
            max-width: 1128px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .card {
            background-color: var(--white);
            border-radius: 8px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            overflow: hidden;
        }

        .card-header {
            padding: 20px 24px 0 24px;
            font-size: 20px;
            font-weight: 600;
        }

        .card-content {
            padding: 24px;
        }

        /* --- Header Section (Sửa lỗi che tên) --- */
        .profile-header-card {
            position: relative;
        }

        .banner {
            height: 200px;
            background: linear-gradient(135deg, #A0B4CB 0%, #708090 100%);
            background-size: cover;
            background-position: center;
        }

        .profile-info-wrapper {
            padding: 0 24px 24px 24px;
            position: relative;
        }
